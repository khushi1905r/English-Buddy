<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Dashboard - English Buddy</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:30px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.card h2{
    color:#2563eb;
    margin-bottom:10px;
}

.card p{
    font-size:1.8rem;
    font-weight:bold;
}

.chart-container{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.badges{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.badge{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.badge span{
    font-size:2rem;
    display:block;
    margin-bottom:10px;
}

.reset-btn{
    display:block;
    margin:30px auto;
    padding:12px 25px;
    border:none;
    background:#dc2626;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.reset-btn:hover{
    background:#b91c1c;
}
</style>
</head>

<body>

<div class="container">

    <h1>📈 English Buddy Progress Dashboard</h1>

    <!-- Statistics -->

    <div class="stats">

        <div class="card">
            <h2>📚 Words Learned</h2>
            <p id="words">0</p>
        </div>

        <div class="card">
            <h2>✍ Grammar Score</h2>
            <p id="grammar">0%</p>
        </div>

        <div class="card">
            <h2>🔥 Streak</h2>
            <p id="streak">0</p>
        </div>

        <div class="card">
            <h2>🎤 Speaking Sessions</h2>
            <p id="speaking">0</p>
        </div>

    </div>

    <!-- Chart -->

    <div class="chart-container">
        <canvas id="progressChart"></canvas>
    </div>

    <!-- Badges -->

    <h2 style="text-align:center;margin-bottom:20px;">
        🏆 Achievement Badges
    </h2>

    <div class="badges">

        <div class="badge">
            <span>📚</span>
            Vocabulary Master
        </div>

        <div class="badge">
            <span>✍</span>
            Grammar Expert
        </div>

        <div class="badge">
            <span>🎤</span>
            Speaking Champion
        </div>

        <div class="badge">
            <span>🔥</span>
            Streak Warrior
        </div>

    </div>

    <button class="reset-btn" onclick="resetProgress()">
        Reset Progress
    </button>

</div>

<script>

// Load Saved Data

const wordsLearned =
Number(
localStorage.getItem("wordsLearned")
) || 0;

const grammarScore =
localStorage.getItem("grammarScore")
|| "0";

const streak =
Number(
localStorage.getItem("streak")
) || 0;

const speakingSessions =
Number(
localStorage.getItem("practiceCount")
) || 0;


// Display Values

document.getElementById(
"words"
).textContent = wordsLearned;

document.getElementById(
"grammar"
).textContent = grammarScore + "%";

document.getElementById(
"streak"
).textContent = streak;

document.getElementById(
"speaking"
).textContent =
speakingSessions;


// Chart

const ctx =
document
.getElementById("progressChart")
.getContext("2d");

new Chart(ctx,{

type:"bar",

data:{

labels:[
"Vocabulary",
"Grammar",
"Speaking",
"Streak"
],

datasets:[{

label:"Progress",

data:[
wordsLearned,
grammarScore,
speakingSessions,
streak
]

}]

},

options:{

responsive:true,

plugins:{
legend:{
display:true
}
}

}

});


// Reset Progress

function resetProgress(){

if(
confirm(
"Are you sure you want to reset all progress?"
)
){

localStorage.removeItem(
"wordsLearned"
);

localStorage.removeItem(
"grammarScore"
);

localStorage.removeItem(
"streak"
);

localStorage.removeItem(
"practiceCount"
);

location.reload();

}

}

</script>

</body>
</html>
