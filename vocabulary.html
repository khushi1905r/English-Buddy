<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Learning - English Buddy</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fc;
            color:#333;
        }

        header{
            background:#2563eb;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:30px 0;
        }

        .search-box{
            text-align:center;
            margin-bottom:30px;
        }

        .search-box input{
            width:80%;
            max-width:500px;
            padding:12px;
            border:2px solid #2563eb;
            border-radius:10px;
            font-size:16px;
        }

        .category-buttons{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:30px;
        }

        .category-buttons button{
            padding:10px 18px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        .category-buttons button:hover{
            background:#1d4ed8;
        }

        .words-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:20px;
        }

        .word-card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:.3s;
        }

        .word-card:hover{
            transform:translateY(-5px);
        }

        .word-card h3{
            color:#2563eb;
            margin-bottom:10px;
        }

        .word-card p{
            margin-bottom:8px;
        }

        .word-card button{
            margin-top:10px;
            padding:8px 15px;
            border:none;
            background:#16a34a;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        .stats{
            text-align:center;
            margin:25px 0;
            font-size:20px;
            font-weight:bold;
            color:#16a34a;
        }
    </style>
</head>
<body>

<header>
    <h1>📚 Vocabulary Learning</h1>
    <p>Learn useful English words daily</p>
</header>

<div class="container">

    <div class="stats">
        Words Learned: <span id="learnedCount">0</span>
    </div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search a word..."
        >
    </div>

    <div class="category-buttons">
        <button onclick="filterWords('all')">All</button>
        <button onclick="filterWords('daily')">Daily Use</button>
        <button onclick="filterWords('business')">Business</button>
        <button onclick="filterWords('technology')">Technology</button>
        <button onclick="filterWords('education')">Education</button>
    </div>

    <div class="words-container" id="wordsContainer">
    </div>

</div>

<script>

const words = [

{
word:"Confident",
meaning:"Feeling sure about yourself.",
example:"I am confident while speaking English.",
category:"daily"
},

{
word:"Opportunity",
meaning:"A chance to do something.",
example:"This internship is a great opportunity.",
category:"business"
},

{
word:"Achievement",
meaning:"Something accomplished successfully.",
example:"Winning the competition was an achievement.",
category:"education"
},

{
word:"Programming",
meaning:"Writing instructions for computers.",
example:"Programming is an important skill.",
category:"technology"
},

{
word:"Knowledge",
meaning:"Information and understanding.",
example:"Reading increases knowledge.",
category:"education"
},

{
word:"Communication",
meaning:"Exchange of information.",
example:"Good communication is essential.",
category:"daily"
},

{
word:"Innovation",
meaning:"A new idea or method.",
example:"Innovation drives technology.",
category:"technology"
},

{
word:"Leadership",
meaning:"Ability to guide people.",
example:"Leadership is valuable in business.",
category:"business"
}

];

const container =
document.getElementById("wordsContainer");

function displayWords(wordList){

container.innerHTML="";

wordList.forEach(item=>{

container.innerHTML += `
<div class="word-card">

<h3>${item.word}</h3>

<p><strong>Meaning:</strong>
${item.meaning}</p>

<p><strong>Example:</strong>
${item.example}</p>

<button onclick="markLearned()">
Mark Learned
</button>

</div>
`;

});

}

displayWords(words);

function filterWords(category){

if(category==="all"){
displayWords(words);
return;
}

const filtered =
words.filter(
item => item.category===category
);

displayWords(filtered);

}

document
.getElementById("searchInput")
.addEventListener("keyup",function(){

const value =
this.value.toLowerCase();

const filtered =
words.filter(item=>
item.word.toLowerCase().includes(value)
);

displayWords(filtered);

});

function markLearned(){

let count =
Number(
localStorage.getItem("wordsLearned")
) || 0;

count++;

localStorage.setItem(
"wordsLearned",
count
);

document.getElementById(
"learnedCount"
).textContent = count;

}

window.onload = () => {

let count =
Number(
localStorage.getItem("wordsLearned")
) || 0;

document.getElementById(
"learnedCount"
).textContent = count;

};

</script>

</body>
</html>
